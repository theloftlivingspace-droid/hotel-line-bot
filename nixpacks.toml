[phases.setup]
nixPkgs = ["chromium", "nss", "nspr", "atk", "cups", "dbus", "glib", "expat",
           "libxcb", "libxkbcommon", "xorg.libX11", "xorg.libXcomposite",
           "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr",
           "xorg.libxshmfence", "xorg.libXtst", "mesa", "pango", "cairo", "alsa-lib"]

[phases.install]
cmds = ["npm install", "npx playwright install chromium"]

[start]
cmd = "node bot.js"
